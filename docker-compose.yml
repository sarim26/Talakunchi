services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: talakunchi
      POSTGRES_PASSWORD: talakunchi
      POSTGRES_DB: talakunchi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talakunchi -d talakunchi"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  api:
    build:
      context: ./api
    environment:
      PORT: "8080"
      DATABASE_URL: "postgresql://talakunchi:talakunchi@postgres:5432/talakunchi"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
      AI_MODE: "${AI_MODE:-mock}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-1.5-flash}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started

  worker:
    build:
      context: ./worker
    environment:
      DATABASE_URL: "postgresql://talakunchi:talakunchi@postgres:5432/talakunchi"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
      SCAN_MODE: "nmap"
      # Tune if needed (safe defaults):
      # -Pn: skip ping (works even if ICMP blocked)
      # -vv --stats-every: show progress in logs
      # -sV --version-light: light service detection
      # --top-ports 200: keep demo fast
      NMAP_ARGS: "-Pn -vv --reason --stats-every 5s -sV --version-light --top-ports 200"
      POLL_INTERVAL_MS: "1500"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  neo4jdata:

