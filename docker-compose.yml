services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: talakunchi
      POSTGRES_PASSWORD: talakunchi
      POSTGRES_DB: talakunchi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talakunchi -d talakunchi"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  api:
    build:
      context: ./api
    environment:
      PORT: "8080"
      DATABASE_URL: "postgresql://talakunchi:talakunchi@postgres:5432/talakunchi"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
      AI_MODE: "${AI_MODE:-mock}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash-lite}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started

  worker:
    build:
      context: ./worker
    environment:
      DATABASE_URL: "postgresql://talakunchi:talakunchi@postgres:5432/talakunchi"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
      SCAN_MODE: "${SCAN_MODE:-agent}"
      AGENT_ENABLED: "${AGENT_ENABLED:-true}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-1.5-flash}"
      AGENT_MAX_STEPS: "${AGENT_MAX_STEPS:-25}"
      AGENT_CMD_TIMEOUT_MS: "${AGENT_CMD_TIMEOUT_MS:-120000}"
      AGENT_SCOPE: "${AGENT_SCOPE:-}"
      # Optional deterministic credential checks during scan stage (separate from AI exploitation stage)
      HYDRA_ENABLED: "${HYDRA_ENABLED:-false}"
      # Hydra reads wordlists inside the container from /wordlists.
      # We mount ./.cache/wordlists -> /wordlists below.
      HYDRA_USERLIST: "${HYDRA_USERLIST:-/wordlists/cirt-default-usernames.txt}"
      HYDRA_PASSLIST: "${HYDRA_PASSLIST:-/wordlists/rockyou.txt}"
      HYDRA_THREADS: "${HYDRA_THREADS:-10}"
      HYDRA_STOP_ON_FIRST_FIND: "${HYDRA_STOP_ON_FIRST_FIND:-false}"
      HYDRA_TIMEOUT_MS: "${HYDRA_TIMEOUT_MS:-600000}"
      # Tune if needed (safe defaults):
      # -Pn: skip ping (works even if ICMP blocked)
      # -vv --stats-every: show progress in logs
      # -sV --version-light: light service detection
      # --top-ports 200: keep demo fast
      NMAP_ARGS: "-Pn -vv --reason --stats-every 5s -sV --version-light --top-ports 200"
      POLL_INTERVAL_MS: "1500"
    volumes:
      # Mount local wordlists into the container for Hydra attacks.
      # Expected container paths: /wordlists/userlist.txt and /wordlists/rockyou.txt (or set envs to your filenames).
      - ./.cache/wordlists:/wordlists:ro
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  neo4jdata:

