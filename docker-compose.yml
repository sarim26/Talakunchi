services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: talakunchi
      POSTGRES_PASSWORD: talakunchi
      POSTGRES_DB: talakunchi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talakunchi -d talakunchi"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  api:
    build:
      context: ./api
    environment:
      PORT: "8080"
      DATABASE_URL: "postgresql://talakunchi:talakunchi@postgres:5432/talakunchi"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
      AI_MODE: "${AI_MODE:-mock}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started

  worker:
    build:
      context: ./worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://talakunchi:talakunchi@postgres:5432/talakunchi"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
      SCAN_MODE: "${SCAN_MODE:-agent}"
      AGENT_ENABLED: "${AGENT_ENABLED:-true}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-1.5-flash}"
      AGENT_MAX_STEPS: "${AGENT_MAX_STEPS:-25}"
      AGENT_SCOPE: "${AGENT_SCOPE:-}"
      # Optional deterministic credential checks during scan stage (separate from AI exploitation stage)
      HYDRA_ENABLED: "${HYDRA_ENABLED:-false}"
      # Hydra runs on the SSH host; these paths must exist there (container /wordlists mount is optional).
      HYDRA_USERLIST: "${HYDRA_USERLIST:-/usr/share/seclists/Usernames/cirt-default-usernames.txt}"
      HYDRA_PASSLIST: "${HYDRA_PASSLIST:-/usr/share/seclists/Passwords/Common-Credentials/10-million-password-list-top-10000.txt}"
      HYDRA_THREADS: "${HYDRA_THREADS:-10}"
      HYDRA_STOP_ON_FIRST_FIND: "${HYDRA_STOP_ON_FIRST_FIND:-false}"
      # Required: all tools execute on this host over SSH (worker only runs Node + ssh).
      REMOTE_SSH_HOST: "${REMOTE_SSH_HOST}"
      REMOTE_SSH_USER: "${REMOTE_SSH_USER}"
      REMOTE_SSH_PORT: "${REMOTE_SSH_PORT:-22}"
      REMOTE_SSH_PASSWORD: "${REMOTE_SSH_PASSWORD:-}"
      REMOTE_SSH_IDENTITY_FILE: "${REMOTE_SSH_IDENTITY_FILE:-}"
      REMOTE_SSH_STRICT_HOST_KEY_CHECKING: "${REMOTE_SSH_STRICT_HOST_KEY_CHECKING:-accept-new}"
      NMAP_ARGS: ${NMAP_ARGS:-"-Pn -vvv --reason --stats-every 5s -sV --version-light --top-ports 200"}
      POLL_INTERVAL_MS: "1500"
    volumes:
      # Optional: only if HYDRA_* paths point at /wordlists/... on the container side; with SSH-Kali you usually use paths on Kali only.
      - ./.cache/wordlists:/wordlists:ro
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  neo4jdata:

